openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stocks
    description: Stock analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /stocks/quote:
    get:
      operationId: getStockQuote
      tags: [stocks]
      summary: Get stock quote
      description: Returns current stock price and basic info
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockQuote"
        "404":
          description: Stock not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stocks/history:
    get:
      operationId: getStockHistory
      tags: [stocks]
      summary: Get stock price history
      description: Returns historical price data for a stock
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [1d, 5d, 1mo, 3mo, 6mo, 1y]
            default: 1mo
      responses:
        "200":
          description: Historical price data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockHistory"
  /stocks/analyze:
    post:
      operationId: analyzeStock
      tags: [stocks]
      summary: Analyze a stock with AI
      description: Returns AI-powered analysis with predictions and recommendations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeStockRequest"
      responses:
        "200":
          description: Stock analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockAnalysis"
  /stocks/discover:
    get:
      operationId: discoverStocks
      tags: [stocks]
      summary: Discover trending stocks and crypto
      description: Returns AI-curated stock and crypto picks based on market trends, movers, and news analysis with profit strategies
      responses:
        "200":
          description: Discovered stock picks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverResponse"
  /stocks/search:
    get:
      operationId: searchStocks
      tags: [stocks]
      summary: Search for stocks
      description: Search for stocks by name or ticker symbol
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSearchResults"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    StockQuote:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        open:
          type: number
        high:
          type: number
        low:
          type: number
        volume:
          type: number
        marketCap:
          type: number
        pe:
          type: number
        week52High:
          type: number
        week52Low:
          type: number
        currency:
          type: string
        exchange:
          type: string
        timestamp:
          type: string
      required:
        - symbol
        - name
        - price
        - change
        - changePercent
        - currency
        - exchange
        - timestamp
    StockHistory:
      type: object
      properties:
        symbol:
          type: string
        period:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/PricePoint"
      required:
        - symbol
        - period
        - data
    PricePoint:
      type: object
      properties:
        date:
          type: string
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
      required:
        - date
        - open
        - high
        - low
        - close
        - volume
    AnalyzeStockRequest:
      type: object
      properties:
        symbol:
          type: string
        investmentStrategy:
          type: string
          enum: [standard, futures, short]
          default: standard
        quote:
          $ref: "#/components/schemas/StockQuote"
        history:
          $ref: "#/components/schemas/StockHistory"
      required:
        - symbol
    EntryStrategy:
      type: object
      properties:
        idealEntryPrice:
          type: number
        entryConditions:
          type: array
          items:
            type: string
        supportLevels:
          type: array
          items:
            type: number
        timing:
          type: string
      required:
        - idealEntryPrice
        - entryConditions
        - supportLevels
        - timing
    ExitStrategy:
      type: object
      properties:
        targetExitPrice:
          type: number
        stopLossPrice:
          type: number
        trailingStopPercent:
          type: number
        exitConditions:
          type: array
          items:
            type: string
        resistanceLevels:
          type: array
          items:
            type: number
        timing:
          type: string
      required:
        - targetExitPrice
        - stopLossPrice
        - trailingStopPercent
        - exitConditions
        - resistanceLevels
        - timing
    FuturesSpecific:
      type: object
      properties:
        recommendedDuration:
          type: string
        leverageConsiderations:
          type: string
        marginRequirements:
          type: string
        rolloverTiming:
          type: string
        futuresRisks:
          type: array
          items:
            type: string
      required:
        - recommendedDuration
        - leverageConsiderations
        - marginRequirements
        - rolloverTiming
        - futuresRisks
    ShortSpecific:
      type: object
      properties:
        borrowCostAssessment:
          type: string
        shortSqueezeRisk:
          type: string
        optimalShortEntry:
          type: string
        coverTiming:
          type: string
        shortRisks:
          type: array
          items:
            type: string
      required:
        - borrowCostAssessment
        - shortSqueezeRisk
        - optimalShortEntry
        - coverTiming
        - shortRisks
    StockAnalysis:
      type: object
      properties:
        symbol:
          type: string
        investmentStrategy:
          type: string
          enum: [standard, futures, short]
        recommendation:
          type: string
          enum: [STRONG_BUY, BUY, HOLD, SELL, STRONG_SELL]
        confidence:
          type: number
        targetPrice:
          type: number
        targetPriceRange:
          $ref: "#/components/schemas/PriceRange"
        timeHorizon:
          type: string
        summary:
          type: string
        sentiment:
          type: string
          enum: [BULLISH, NEUTRAL, BEARISH]
        technicalSignals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"
        fundamentalSignals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"
        risks:
          type: array
          items:
            type: string
        catalysts:
          type: array
          items:
            type: string
        priceTargets:
          $ref: "#/components/schemas/PriceTargets"
        entryStrategy:
          $ref: "#/components/schemas/EntryStrategy"
        exitStrategy:
          $ref: "#/components/schemas/ExitStrategy"
        futuresSpecific:
          $ref: "#/components/schemas/FuturesSpecific"
        shortSpecific:
          $ref: "#/components/schemas/ShortSpecific"
        generatedAt:
          type: string
      required:
        - symbol
        - investmentStrategy
        - recommendation
        - confidence
        - targetPrice
        - summary
        - sentiment
        - technicalSignals
        - fundamentalSignals
        - risks
        - catalysts
        - entryStrategy
        - exitStrategy
        - generatedAt
    PriceRange:
      type: object
      properties:
        low:
          type: number
        high:
          type: number
      required:
        - low
        - high
    PriceTargets:
      type: object
      properties:
        bear:
          type: number
        base:
          type: number
        bull:
          type: number
      required:
        - bear
        - base
        - bull
    Signal:
      type: object
      properties:
        name:
          type: string
        signal:
          type: string
          enum: [BULLISH, NEUTRAL, BEARISH]
        detail:
          type: string
      required:
        - name
        - signal
        - detail
    DiscoverResponse:
      type: object
      properties:
        discoveries:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveredStock"
        marketMood:
          type: string
        topHeadlineThemes:
          type: array
          items:
            type: string
        generatedAt:
          type: string
      required:
        - discoveries
        - marketMood
        - topHeadlineThemes
        - generatedAt
    DiscoveredStock:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        category:
          type: string
          enum: [trending, gainers, movers, crypto, ai_pick]
        assetType:
          type: string
          enum: [stock, crypto]
        sentiment:
          type: string
          enum: [BULLISH, BEARISH, NEUTRAL]
        signalSource:
          type: string
        aiSummary:
          type: string
        profitStrategy:
          $ref: "#/components/schemas/ProfitStrategy"
      required:
        - symbol
        - name
        - price
        - change
        - changePercent
        - category
        - assetType
        - sentiment
        - signalSource
        - aiSummary
        - profitStrategy
    ProfitStrategy:
      type: object
      properties:
        action:
          type: string
          enum: [BUY, SELL, SHORT, HOLD, WATCH]
        entry:
          type: string
        target:
          type: string
        stopLoss:
          type: string
        timeframe:
          type: string
        rationale:
          type: string
      required:
        - action
        - entry
        - target
        - stopLoss
        - timeframe
        - rationale
    StockSearchResult:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        exchange:
          type: string
        type:
          type: string
      required:
        - symbol
        - name
        - exchange
        - type
    StockSearchResults:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/StockSearchResult"
        query:
          type: string
      required:
        - results
        - query
